spring.application.name=java-services

# Spring Data MongoDB
spring.mongodb.uri=${MONGODB_URI}
spring.mongodb.database=${MONGODB_DATABASE}

# Spring Data Neo4j
spring.neo4j.uri=${NEO4J_URI}
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=${NEO4J_PASSWORD}

# Compilation sandbox
compilation.sandbox.dir=/app/sandbox
compilation.timeout-seconds=30
