# Development profile configuration
# Load development env file (overrides default .env from application.properties)
springdotenv.filename=.env.dev

spring.config.import=optional:file:./application.properties

server.port=8090

# Local development database endpoints (avoid docker-internal hostnames from .env)
spring.mongodb.uri=mongodb://uom_readonly:uom_readonly@localhost:27027/uom
spring.mongodb.database=uom
spring.neo4j.uri=neo4j://localhost:7697
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=password

# Debug mode for Spring Boot (enables auto-config report)
debug=true

compilation.sandbox.dir=target/sandbox

# Development logging
logging.level.org.springframework=INFO
logging.level.uom.services.benchmarks=DEBUG

# Database logs
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.org.springframework.data.neo4j.cypher=DEBUG
