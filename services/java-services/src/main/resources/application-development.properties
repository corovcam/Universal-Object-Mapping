# Development profile configuration
# Load development env file (overrides default .env from application.properties)
springdotenv.filename=.env.dev

spring.config.import=optional:file:./application.properties

server.port=8090

# Debug mode for Spring Boot (enables auto-config report)
debug=true

# Development logging
logging.level.org.springframework=INFO
logging.level.uom.services.benchmarks=DEBUG

# Database logs
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.org.springframework.data.neo4j.cypher=DEBUG
