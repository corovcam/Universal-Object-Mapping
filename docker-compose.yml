  #   # depends_on:
  #   # - dotnet-service
  #   # - java-service

  dotnet-service:
    build:
      context: ./services/dotnet-service
      dockerfile: Dockerfile
    ports:
      - "5073:5073"
    restart: unless-stopped
    depends_on:
      - mssql_db

  java-service:
    build:
      context: ./services/java-services
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_NEO4J_URI=bolt://neo4j:7687
      - SPRING_NEO4J_AUTHENTICATION_USERNAME=neo4j
      - SPRING_NEO4J_AUTHENTICATION_PASSWORD=Testingneo4j123
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/uom
    restart: unless-stopped
    depends_on:
      - neo4j
      - mongodb

  mssql_db:
    build:
      context: ./ORMConvertor
      dockerfile: database.Dockerfile
    ports:
      - "1444:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Testingorms123
      - MSSQL_PID=Developer
    restart: unless-stopped
    volumes:
      - mssql_data:/var/opt/mssql

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db

  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/Testingneo4j123
      - NEO4J_PLUGINS=["apoc"]
    restart: unless-stopped
    volumes:
      - neo4j_data:/data

volumes:
  mssql_data:
  mongodb_data:
  neo4j_data:
